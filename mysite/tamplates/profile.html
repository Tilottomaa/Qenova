<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
</head>
<body>

<h1>User Profile</h1>

<hr>

<h2>{{ user.name }}</h2>

<p>Email: {{ user.email }}</p>

<p>Status: {{ user.status }}</p>

<p>Last Login: {{ user.last_login }}</p>

<p>Role: {{ user.role }}</p>

{% if user.profile_pic %}

    <img src="{{ user.profile_pic.url }}" width="200">

{% endif %}

<br><br>

<a href="{% url 'update_user' user.id %}">
    Edit Profile
</a>

<br><br>

<a href="{% url 'dashboard' %}">
    Back to Dashboard
</a>

</body>
</html>

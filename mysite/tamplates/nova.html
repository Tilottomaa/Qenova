<!-- base.html -->

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
            Qenova
        {% endblock %}
    </title>

    <!-- Bootstrap CSS -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background-color:#dff6ff;">


<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">

    <div class="container">

        <!-- Logo -->

        <a class="navbar-brand fw-bold" href="/">
            Qenova
        </a>

        <!-- Toggle Button -->

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <!-- Navbar Links -->

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">

                    <a class="nav-link" href="/">
                        Home
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link" href="{% url 'user_list' %}">
                        Users
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link" href="{% url 'user_upload' %}">
                        Upload User
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link" href="{% url 'dashboard' %}">
                        Dashboard
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link" href="{% url 'profile' %}">
                        Profile
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link text-warning" href="{% url 'logout' %}">
                        Logout
                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>


<!-- MAIN CONTENT -->

<div class="container mt-5">

    {% block content %}

    {% endblock %}

</div>


<!-- FOOTER -->

<footer class="bg-primary text-white text-center p-3 mt-5">

    <p class="mb-0">
        © 2026 Qenova | Smart Queue Management System
    </p>

</footer>


<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
